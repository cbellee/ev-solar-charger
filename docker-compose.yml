services:
  solar-ev-charger:
    build: .
    ports:
      - "8090:8080"
    env_file: .env
    environment:
      HTTP_HOST: 0.0.0.0
      LOG_LEVEL: info
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    volumes:
      - ./secrets:/secrets:ro
      - solar-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/solar-ev-charger", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  solar-data:
