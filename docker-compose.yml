services:
  tesla-http-proxy:
    image: tesla/vehicle-command:latest
    command:
      - tesla-http-proxy
      - -tls-key=/secrets/proxy-tls-key.pem
      - -cert=/secrets/proxy-tls-cert.pem
      - -key-file=/secrets/fleet-key.pem
      - -host=0.0.0.0
      - -port=4443
    volumes:
      - ./secrets:/secrets:ro
    restart: unless-stopped

  solar-ev-charger:
    build: .
    ports:
      - "8090:8080"
    env_file: .env
    environment:
      HTTP_HOST: 0.0.0.0
      LOG_LEVEL: info
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TESLA_COMMAND_BASE: https://tesla-http-proxy:4443
      TESLA_PROXY_CA_FILE: /secrets/proxy-tls-cert.pem
    volumes:
      - ./secrets:/secrets:ro
      - solar-data:/data
    restart: unless-stopped
    depends_on:
      - tesla-http-proxy
    healthcheck:
      test: ["CMD", "/solar-ev-charger", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  solar-data:
