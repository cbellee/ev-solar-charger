services:
  solar-ev-charger:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    environment:
      HTTP_HOST: 0.0.0.0
    volumes:
      - ./secrets:/secrets:ro
      - solar-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/solar-ev-charger", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  solar-data:
